<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLASHCARDS.EXE — FocusOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0D1117;
      --panel: #2A2E3A;
      --panel-light: #383D4D;
      --text: #E8E6F0;
      --muted: #8B8FA3;
      --track: #454B5C;
      --focus: #FF9F1C;
      --short: #7C5CFF;
      --long: #3DDC97;
      --danger: #FF5470;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      overflow: hidden;
      background: transparent;
    }

    canvas#space-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -100;
      pointer-events: none;
    }

    .page {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---------- Window chrome (matches FocusOS) ---------- */
    .window {
      display: flex;
      flex-direction: column;
      width: 400px;
      background: var(--panel);
      border: 1px solid #11141b;
      box-shadow: 6px 6px 0 rgba(0,0,0,0.45);
      z-index: 1;
    }

    .titlebar {
      height: 32px;
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      background: linear-gradient(to bottom, var(--panel-light), var(--panel));
      border-bottom: 1px solid #11141b;
    }

    .titlebar .name {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .winbtns { display: flex; gap: 6px; }

    .winbtn {
      width: 18px; height: 18px;
      border: 1px solid var(--muted);
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }
    .winbtn:hover { border-color: var(--text); color: var(--text); }

    .content { padding: 16px; }

    /* ---------- Input section ---------- */
    .fc-input-area { margin-bottom: 12px; }

    .fc-input-area textarea {
      width: 100%;
      height: 80px;
      background: var(--bg);
      border: 1px solid var(--track);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      outline: none;
    }
    .fc-input-area textarea:focus { border-color: var(--muted); }
    .fc-input-area textarea::placeholder { color: var(--muted); }

    .btn {
      padding: 8px 0;
      font-size: 11px;
      letter-spacing: 0.08em;
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--track);
      color: var(--text);
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { border-color: var(--muted); }

    .btn.primary {
      background: var(--focus);
      color: #0D1117;
      border-color: var(--focus);
      font-weight: 600;
    }
    .btn.primary:hover { opacity: 0.9; }
    .btn.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .fc-error {
      font-size: 10px;
      color: var(--danger);
      margin-top: 6px;
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    .fc-loading {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      padding: 8px 0;
      display: none;
    }
    .fc-loading.visible { display: block; }

    /* ---------- Card area ---------- */
    .fc-deck {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 14px;
      border-top: 1px solid var(--track);
      padding-top: 14px;
    }
    .fc-deck.visible { display: flex; }

    .fc-card-wrapper {
      perspective: 800px;
      width: 100%;
      height: 200px;
      cursor: pointer;
    }

    .fc-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }
    .fc-card.flipped { transform: rotateY(180deg); }

    .fc-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      border: 1px solid var(--track);
    }

    .fc-front { background: var(--bg); }

    .fc-back {
      background: var(--panel-light);
      transform: rotateY(180deg);
    }

    .fc-meta {
      position: absolute;
      top: 10px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .fc-subject {
      font-size: 9px;
      padding: 2px 8px;
      background: var(--panel);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .fc-diff {
      font-size: 9px;
      padding: 2px 8px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .fc-diff-easy   { background: rgba(61,220,151,0.15); color: var(--long); }
    .fc-diff-medium { background: rgba(255,159,28,0.15); color: var(--focus); }
    .fc-diff-hard   { background: rgba(255,84,112,0.15); color: var(--danger); }

    .fc-text {
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      color: var(--text);
      padding: 0 4px;
    }

    .fc-hint {
      position: absolute;
      bottom: 10px;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Difficulty glow */
    .fc-glow-easy   { box-shadow: 0 0 12px rgba(61,220,151,0.15); }
    .fc-glow-medium { box-shadow: 0 0 12px rgba(255,159,28,0.15); }
    .fc-glow-hard   { box-shadow: 0 0 12px rgba(255,84,112,0.15); }

    /* ---------- Navigation ---------- */
    .fc-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 10px;
      gap: 8px;
    }

    .fc-nav .btn { width: auto; padding: 6px 14px; font-size: 10px; }

    .fc-counter {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .fc-dots {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .fc-dot {
      width: 6px; height: 6px;
      border: 1px solid var(--muted);
      background: transparent;
      cursor: pointer;
    }
    .fc-dot.active {
      background: var(--focus);
      border-color: var(--focus);
    }

    @media (max-width: 440px) {
      .window { width: calc(100% - 24px); }
      .fc-card-wrapper { height: 180px; }
    }
  </style>
</head>
<body>

  <canvas id="space-bg"></canvas>

  <div class="page">
    <div class="window">
      <div class="titlebar">
        <span class="name">FLASHCARDS.EXE</span>
        <div class="winbtns">
          <button class="winbtn" title="Minimize">—</button>
          <button class="winbtn" title="Close">×</button>
        </div>
      </div>
      <div class="content">
        <div class="fc-input-area">
          <textarea id="fcInput" placeholder="Paste study conversation or describe a topic..."></textarea>
        </div>
        <button class="btn primary" id="fcGenBtn">GENERATE</button>
        <div class="fc-error" id="fcError"></div>
        <div class="fc-loading" id="fcLoading">GENERATING FLASHCARDS ...</div>

        <div class="fc-deck" id="fcDeck">
          <div class="fc-card-wrapper" id="fcCardWrapper">
            <div class="fc-card" id="fcCard">
              <div class="fc-face fc-front">
                <div class="fc-meta">
                  <span class="fc-subject" id="fcSubject"></span>
                  <span class="fc-diff" id="fcDiff"></span>
                </div>
                <p class="fc-text" id="fcQuestion"></p>
                <span class="fc-hint">CLICK TO FLIP</span>
              </div>
              <div class="fc-face fc-back">
                <p class="fc-text" id="fcAnswer"></p>
                <span class="fc-hint">CLICK TO FLIP BACK</span>
              </div>
            </div>
          </div>
          <div class="fc-nav">
            <button class="btn" id="fcPrev">◄ PREV</button>
            <span class="fc-counter" id="fcCounter">1 / 1</span>
            <button class="btn" id="fcNext">NEXT ►</button>
          </div>
          <div class="fc-dots" id="fcDots"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============ STARFIELD (from FocusOS index2.html) ============
    (() => {
      const canvas = document.getElementById('space-bg');
      const ctx = canvas.getContext('2d');
      let stars = [];
      const shootingStars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
      }

      function initStars() {
        stars = [];
        const baseCount = Math.floor((canvas.width * canvas.height) / 3500);

        for (let i = 0; i < baseCount; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: (Math.random() * 1.35) + 0.6,
            alpha: (Math.random() * 0.5) + 0.5,
            alphaChange: (Math.random() * 0.018) - 0.009
          });
        }

        const clusterCount = Math.floor(baseCount * 0.95);
        for (let i = 0; i < clusterCount; i++) {
          const startX = Math.random() * canvas.width;
          const startY = (canvas.height - (startX * (canvas.height / canvas.width)))
                         + ((Math.random() - 0.5) * (canvas.height * 0.45));
          stars.push({
            x: startX, y: startY,
            size: (Math.random() * 0.85) + 0.2,
            alpha: (Math.random() * 0.45) + 0.35,
            alphaChange: (Math.random() * 0.012) - 0.006
          });
        }
      }

      class ShootingStar {
        constructor() { this.reset(); }
        reset() {
          if (Math.random() > 0.5) {
            this.x = Math.random() * canvas.width;
            this.y = -10;
          } else {
            this.x = canvas.width + 10;
            this.y = Math.random() * (canvas.height * 0.5);
          }
          this.len = (Math.random() * 60) + 45;
          this.speed = (Math.random() * 4.5) + 7;
          this.size = (Math.random() * 1.3) + 0.9;
          this.angle = Math.PI / 3.8;
          this.opacity = 0;
          this.fadeIn = true;
          this.delay = (Math.random() * 400) + 150;
        }
        update() {
          if (this.delay > 0) { this.delay--; return; }
          this.x -= Math.cos(this.angle) * this.speed;
          this.y += Math.sin(this.angle) * this.speed;
          if (this.fadeIn) {
            this.opacity += 0.06;
            if (this.opacity >= 1) { this.opacity = 1; this.fadeIn = false; }
          } else {
            this.opacity -= 0.018;
          }
          if (this.x < -this.len || this.y > canvas.height + this.len || this.opacity <= 0) {
            this.reset();
          }
        }
        draw() {
          if (this.delay > 0 || this.opacity <= 0) return;
          const tailX = this.x + (Math.cos(this.angle) * this.len);
          const tailY = this.y - (Math.sin(this.angle) * this.len);
          ctx.save();
          const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
          grad.addColorStop(0, `rgba(255,255,255,${this.opacity})`);
          grad.addColorStop(0.15, `rgba(255,228,195,${this.opacity * 0.85})`);
          grad.addColorStop(1, `rgba(255,255,255,0)`);
          ctx.lineWidth = this.size;
          ctx.lineCap = 'round';
          ctx.strokeStyle = grad;
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(tailX, tailY);
          ctx.stroke();
          ctx.restore();
        }
      }

      window.addEventListener('resize', resize);
      shootingStars.push(new ShootingStar(), new ShootingStar());

      function animate() {
        const bgGrad = ctx.createRadialGradient(
          canvas.width * 0.6, canvas.height * 0.3, 10,
          canvas.width * 0.6, canvas.height * 0.3, canvas.width * 0.8
        );
        bgGrad.addColorStop(0, '#0a0b16');
        bgGrad.addColorStop(0.6, '#04040a');
        bgGrad.addColorStop(1, '#010103');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        stars.forEach(s => {
          s.alpha += s.alphaChange;
          if (s.alpha <= 0.4 || s.alpha >= 1) s.alphaChange *= -1;
          ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
          ctx.fillRect(s.x, s.y, s.size, s.size);
        });

        shootingStars.forEach(ss => { ss.update(); ss.draw(); });
        requestAnimationFrame(animate);
      }

      resize();
      animate();
    })();

    // ============ FLASHCARD LOGIC ============
    let fcCards = [];
    let fcIndex = 0;
    let fcFlipped = false;

    const fcCard      = document.getElementById('fcCard');
    const fcCardWrap  = document.getElementById('fcCardWrapper');
    const fcDeck      = document.getElementById('fcDeck');
    const fcQuestion  = document.getElementById('fcQuestion');
    const fcAnswer    = document.getElementById('fcAnswer');
    const fcSubject   = document.getElementById('fcSubject');
    const fcDiff      = document.getElementById('fcDiff');
    const fcCounter   = document.getElementById('fcCounter');
    const fcDotsEl    = document.getElementById('fcDots');
    const fcGenBtn    = document.getElementById('fcGenBtn');
    const fcInput     = document.getElementById('fcInput');
    const fcError     = document.getElementById('fcError');
    const fcLoading   = document.getElementById('fcLoading');
    const fcPrevBtn   = document.getElementById('fcPrev');
    const fcNextBtn   = document.getElementById('fcNext');

    function fcRender(index) {
      const card = fcCards[index];
      if (!card) return;

      if (fcFlipped) {
        fcCard.classList.remove('flipped');
        fcFlipped = false;
      }

      fcQuestion.textContent = card.question;
      fcAnswer.textContent = card.answer;
      fcSubject.textContent = card.subject;

      const diff = card.difficulty;
      fcDiff.textContent = diff;
      fcDiff.className = 'fc-diff fc-diff-' + diff;

      fcCard.className = 'fc-card fc-glow-' + diff;

      fcCounter.textContent = (index + 1) + ' / ' + fcCards.length;

      document.querySelectorAll('.fc-dot').forEach(function(d, i) {
        d.classList.toggle('active', i === index);
      });
    }

    function fcBuildDots() {
      fcDotsEl.innerHTML = '';
      for (let i = 0; i < fcCards.length; i++) {
        const dot = document.createElement('div');
        dot.className = 'fc-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', function() { fcIndex = i; fcRender(i); });
        fcDotsEl.appendChild(dot);
      }
    }

    function fcFlip() {
      fcFlipped = !fcFlipped;
      fcCard.classList.toggle('flipped', fcFlipped);
    }

    function fcNext() {
      if (fcCards.length === 0) return;
      fcIndex = (fcIndex + 1) % fcCards.length;
      fcRender(fcIndex);
    }

    function fcPrev() {
      if (fcCards.length === 0) return;
      fcIndex = (fcIndex - 1 + fcCards.length) % fcCards.length;
      fcRender(fcIndex);
    }

    async function fcGenerate() {
      const text = fcInput.value.trim();
      fcError.textContent = '';

      if (!text) {
        fcError.textContent = 'ENTER STUDY TEXT FIRST.';
        return;
      }

      fcGenBtn.disabled = true;
      fcLoading.classList.add('visible');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        const data = await res.json();

        if (data.error) {
          fcError.textContent = data.error;
          return;
        }

        if (!data.cards || data.cards.length === 0) {
          fcError.textContent = 'NO CARDS GENERATED. ADD MORE DETAIL.';
          return;
        }

        fcCards = data.cards;
        fcIndex = 0;
        fcFlipped = false;
        fcBuildDots();
        fcRender(0);
        fcDeck.classList.add('visible');
      } catch (err) {
        fcError.textContent = 'FAILED TO CONNECT TO SERVER.';
      } finally {
        fcGenBtn.disabled = false;
        fcLoading.classList.remove('visible');
      }
    }

    fcCardWrap.addEventListener('click', fcFlip);
    fcPrevBtn.addEventListener('click', fcPrev);
    fcNextBtn.addEventListener('click', fcNext);
    fcGenBtn.addEventListener('click', fcGenerate);

    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowLeft') fcPrev();
      else if (e.key === 'ArrowRight') fcNext();
      else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); fcFlip(); }
    });
  </script>
</body>
</html>
